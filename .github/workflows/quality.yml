name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@f70796de0a6527dbed267a64835c3cc81b8144e0
    with:
      quality_command: make ci-local
      coverage_file: coverage.out
      upload_codecov: true
      codecov_flags: unittests
      codecov_name: codecov-umbrella
